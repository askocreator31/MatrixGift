<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matrix</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:#000;
  font-family:monospace;
}

/* MATRIX ORQA FON */

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* MARKAZDAGI YOZUV */

h1{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);

  width:100%;

  text-align:center;

  color:#00ff66;

  font-size:clamp(35px,10vw,85px);

  text-shadow:
  0 0 10px #00ff66,
  0 0 25px #00ff66,
  0 0 50px #00ff66;

  animation:pulse 2s infinite alternate;
}

@keyframes pulse{

  from{
    opacity:.7;
    transform:translate(-50%,-50%) scale(1);
  }

  to{
    opacity:1;
    transform:translate(-50%,-50%) scale(1.06);
  }

}

/* TUGMA */

#start{

  position:absolute;

  bottom:80px;

  left:50%;

  transform:translateX(-50%);

  padding:15px 30px;

  background:#000;

  color:#00ff66;

  border:2px solid #00ff66;

  border-radius:8px;

  font-size:16px;

  font-family:monospace;

  box-shadow:
  0 0 10px #00ff66,
  0 0 25px #00ff66;

  cursor:pointer;

  animation:buttonGlow 1.5s infinite alternate;

}

@keyframes buttonGlow{

  from{
    box-shadow:0 0 10px #00ff66;
  }

  to{
    box-shadow:
    0 0 20px #00ff66,
    0 0 40px #00ff66;
  }

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<h1>Assalomu alaykum 👋</h1>

<button id="start" onclick="startMatrix()">
ENTER THE MATRIX
</button>


<script>

/* =========================
   MATRIX EFFEKT
========================= */

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;


const letters =
"アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const fontSize = 16;

let columns =
Math.floor(canvas.width / fontSize);

let drops =
Array(columns).fill(1);


function drawMatrix(){

  ctx.fillStyle =
  "rgba(0,0,0,0.07)";

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );


  ctx.fillStyle =
  "#00ff66";

  ctx.font =
  fontSize + "px monospace";


  for(
    let i = 0;
    i < drops.length;
    i++
  ){

    const text =
    letters[
      Math.floor(
        Math.random() *
        letters.length
      )
    ];


    ctx.fillText(
      text,
      i * fontSize,
      drops[i] * fontSize
    );


    if(
      drops[i] * fontSize >
      canvas.height
      &&
      Math.random() > 0.975
    ){

      drops[i] = 0;

    }


    drops[i]++;

  }

}


setInterval(
  drawMatrix,
  35
);


/* =========================
   MATRIX HACKER OVOZI
========================= */

function startMatrix(){

  const audio =
  new AudioContext();


  /* 1-Ovoz */

  const osc =
  audio.createOscillator();

  const gain =
  audio.createGain();


  osc.type =
  "sawtooth";


  osc.frequency.setValueAtTime(
    55,
    audio.currentTime
  );


  osc.frequency.exponentialRampToValueAtTime(
    700,
    audio.currentTime + 2
  );


  gain.gain.setValueAtTime(
    0.001,
    audio.currentTime
  );


  gain.gain.exponentialRampToValueAtTime(
    0.35,
    audio.currentTime + 0.3
  );


  gain.gain.exponentialRampToValueAtTime(
    0.001,
    audio.currentTime + 3
  );


  osc.connect(gain);

  gain.connect(
    audio.destination
  );


  osc.start();

  osc.stop(
    audio.currentTime + 3
  );


  /* 2-CHUQUR DIGITAL OVOZ */

  setTimeout(() => {

    const osc2 =
    audio.createOscillator();

    const gain2 =
    audio.createGain();


    osc2.type =
    "square";


    osc2.frequency.setValueAtTime(
      120,
      audio.currentTime
    );


    osc2.frequency.exponentialRampToValueAtTime(
      40,
      audio.currentTime + 2
    );


    gain2.gain.setValueAtTime(
      0.001,
      audio.currentTime
    );


    gain2.gain.exponentialRampToValueAtTime(
      0.18,
      audio.currentTime + 0.2
    );


    gain2.gain.exponentialRampToValueAtTime(
      0.001,
      audio.currentTime + 2
    );


    osc2.connect(gain2);

    gain2.connect(
      audio.destination
    );


    osc2.start();

    osc2.stop(
      audio.currentTime + 2
    );


  }, 500);


  /* TUGMANI YOPISH */

  document
  .getElementById("start")
  .style.display =
  "none";

}


/* EKRAN O'LCHAMI */

window.addEventListener(
  "resize",
  () => {

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;


    columns =
    Math.floor(
      canvas.width / fontSize
    );


    drops =
    Array(columns).fill(1);

  }
);

</script>

</body>
</html>
