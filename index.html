<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilshoda🫶</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Consolas,monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#00ff66;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

#overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
max-width:800px;
}

h1{
font-size:60px;
color:#ff4fd8;
text-shadow:
0 0 10px #ff4fd8,
0 0 25px #ff4fd8,
0 0 60px #ff4fd8;
margin-bottom:30px;
animation:glow 2s infinite alternate;
}

@keyframes glow{

from{

text-shadow:
0 0 10px #ff4fd8,
0 0 20px #ff4fd8;

}

to{

text-shadow:
0 0 25px #ff4fd8,
0 0 50px #ff4fd8,
0 0 80px #ff4fd8;

}

}

#text{

font-size:24px;
line-height:40px;
color:#ffffff;

text-shadow:
0 0 8px #00ff66;

min-height:220px;

}

.cursor{

display:inline-block;
width:10px;
background:#fff;

animation:blink .8s infinite;

}

@keyframes blink{

50%{
opacity:0;
}

}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="overlay">

<h1>Dilshoda🫶</h1>

<div id="text"></div>

</div>

<script>

const canvas=document.getElementById("matrix");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZアイウエオカサタナハマヤラワ";

const fontSize=16;

const columns=Math.floor(canvas.width/fontSize);

const drops=[];

for(let i=0;i<columns;i++){

drops[i]=1;

}

function draw(){

ctx.fillStyle="rgba(0,0,0,.06)";

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff66";

ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height&&Math.random()>0.975){

drops[i]=0;

}

drops[i]++;

}

}

setInterval(draw,35);
  const message=`Meni kechir... ❤️

Ba'zan inson o'zi ham sezmagan holda
eng qadrli insonining ko'nglini
og'ritib qo'yar ekan...

Agar seni xafa qilgan bo'lsam,
chin yurakdan uzr so'rayman.

Sen oddiy inson emassan...
Sen men uchun juda qadrli
va alohida insonsan. 🫶

Har bir tabassuming
men uchun dunyolarga teng.

Agar imkon bersang,
hammasini yaxshilashga
harakat qilaman.

Sening kechirishing
men uchun juda muhim... ❤️`;

const target=document.getElementById("text");

let i=0;

function type(){

if(i<message.length){

if(message.charAt(i)=="\n"){

target.innerHTML+="<br>";

}else{

target.innerHTML+=message.charAt(i);

}

i++;

setTimeout(type,45);

}else{

target.innerHTML+='<span class="cursor"></span>';

}

}

setTimeout(type,1500);

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

});
</script>

</body>
</html>
