<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diora ❤️</title>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

body{
 background:black;
 overflow:hidden;
 font-family:monospace;
}

canvas{
 position:fixed;
 top:0;
 left:0;
 z-index:0;
}

#text{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 width:85%;
 color:white;
 font-size:18px;
 line-height:1.6;
 white-space:pre-line;
 z-index:2;
 text-shadow:0 0 10px #00ff00;
}

.cursor{
 animation:blink .7s infinite;
}

@keyframes blink{
 50%{opacity:0;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="text"></div>


<script>

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="01DIORA❤️";
const size=18;

let columns=Math.floor(canvas.width/size);
let drops=[];

for(let i=0;i<columns;i++){
 drops[i]=1;
}


function matrix(){

ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=size+"px monospace";


for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*size,drops[i]*size);

if(drops[i]*size>canvas.height && Math.random()>0.97){
 drops[i]=0;
}

drops[i]++;
}

}

setInterval(matrix,50);



const message=`Diora ❤️

Bilasanmi...

Senda menga juda ko'p narsalar yoqadi.

Sening kulishing,
gaplashishing,
oddiygina borliging ham.

Ba'zida endi tanishgan boʻlsak ham,
seni sogʻinb qolaman

Har safar yozishingni kutaman.

O'zingni ehtiyot qil.

Va bitta narsani unutma...

Seni xaraktering goʻzal va noyob. 😅

Sen bilan tanishganimdan
juda xursandman.

— Asad`;



const box=document.getElementById("text");

let index=0;


function typing(){

if(index < message.length){

box.innerHTML += message[index];

index++;

setTimeout(typing,60);

}

else{

box.innerHTML += '<span class="cursor">|</span>';

}

}


typing();


window.onresize=()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

columns=Math.floor(canvas.width/size);
drops=[];

for(let i=0;i<columns;i++){
 drops[i]=1;
}

}

</script>

</body>
</html>
