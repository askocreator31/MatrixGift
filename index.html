<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitti malikam uchun ❤️</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(135deg, #ffd6e5, #ffb5ce, #ffe3ed);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* Yurakchalar */
.heart {
  position: absolute;
  bottom: -50px;
  color: #d94f7a;
  animation: fly 7s linear infinite;
  z-index: 1;
}

@keyframes fly {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 0;
  }

  20% {
    opacity: 1;
  }

  100% {
    transform: translateY(-115vh) rotate(360deg);
    opacity: 0;
  }
}

/* Asosiy sahna */
.scene {
  text-align: center;
  position: relative;
  z-index: 5;
  animation: sceneIn 2s ease;
}

@keyframes sceneIn {
  from {
    opacity: 0;
    transform: scale(0.5);
  }

  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* Quti */
.gift {
  position: relative;
  width: 230px;
  height: 150px;
  margin: 0 auto;
  animation: floating 3s ease-in-out infinite;
}

@keyframes floating {
  0%, 100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-10px);
  }
}

.box {
  position: absolute;
  bottom: 0;
  width: 230px;
  height: 125px;
  background: #e85b82;
  border-radius: 8px;
  box-shadow: 0 15px 25px #b8325b66;
}

.box::before {
  content: "";
  position: absolute;
  left: 95px;
  width: 40px;
  height: 125px;
  background: #ffb2c9;
}

.lid {
  position: absolute;
  top: 5px;
  left: -10px;
  width: 250px;
  height: 40px;
  background: #d9436d;
  border-radius: 8px;
  transform-origin: left bottom;
  animation: openLid 4s ease-in-out forwards;
  z-index: 5;
}

.lid::after {
  content: "";
  position: absolute;
  left: 105px;
  width: 40px;
  height: 40px;
  background: #ffb2c9;
}

@keyframes openLid {
  0%, 25% {
    transform: rotate(0deg);
  }

  45%, 100% {
    transform: rotate(-35deg) translate(-15px, -35px);
  }
}

/* Quyoncha */
.bunny {
  position: absolute;
  bottom: 65px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  opacity: 0;
  animation: bunnyOut 4s ease-in-out forwards;
  z-index: 3;
}

@keyframes bunnyOut {
  0%, 35% {
    transform: translateX(-50%) translateY(80px);
    opacity: 0;
  }

  55% {
    transform: translateX(-50%) translateY(-25px);
    opacity: 1;
  }

  70%, 100% {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
}

/* Quloqlar */
.ear {
  position: absolute;
  width: 35px;
  height: 75px;
  background: white;
  border-radius: 50%;
  top: -65px;
  box-shadow: 0 4px 8px #aaa;
}

.ear.left {
  left: 12px;
  transform: rotate(-15deg);
}

.ear.right {
  right: 12px;
  transform: rotate(15deg);
}

/* Quyon boshi */
.head {
  position: relative;
  width: 115px;
  height: 105px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 8px 15px #aaa;
}

/* Ko'zlar */
.eye {
  position: absolute;
  top: 38px;
  width: 13px;
  height: 17px;
  background: #222;
  border-radius: 50%;
}

.eye.left {
  left: 28px;
}

.eye.right {
  right: 28px;
}

/* Burun */
.nose {
  position: absolute;
  top: 62px;
  left: 50%;
  transform: translateX(-50%);
  width: 15px;
  height: 12px;
  background: #e87898;
  border-radius: 50%;
}

/* Yurak */
.rabbit-heart {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 50px;
  opacity: 0;
  animation: heartAppear 5s ease-in-out forwards;
  z-index: 10;
}

@keyframes heartAppear {
  0%, 55% {
    opacity: 0;
    transform: translateX(-50%) scale(0);
  }

  70% {
    opacity: 1;
    transform: translateX(-50%) scale(1.3);
  }

  80%, 100% {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }
}

/* Yozuv */
.title {
  margin-top: 35px;
  color: #a62e55;
  font-size: clamp(30px, 8vw, 55px);
  font-family: cursive;
  opacity: 0;
  animation: titleAppear 2s ease forwards;
  animation-delay: 5.5s;
  text-shadow: 2px 2px 5px white;
}

@keyframes titleAppear {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.7);
  }

  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Yaltirashlar */
.sparkle {
  position: absolute;
  color: white;
  font-size: 25px;
  animation: sparkle 2s infinite alternate;
}

@keyframes sparkle {
  from {
    opacity: 0.2;
    transform: scale(0.5);
  }

  to {
    opacity: 1;
    transform: scale(1.5);
  }
}
</style>
</head>

<body>

<script>
/* Uchib yuradigan yurakchalar */
for (let i = 0; i < 25; i++) {
  const heart = document.createElement("div");

  heart.className = "heart";
  heart.innerHTML = "♥";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 30) + "px";
  heart.style.animationDuration = (5 + Math.random() * 6) + "s";
  heart.style.animationDelay = Math.random() * 6 + "s";

  document.body.appendChild(heart);
}

/* Yaltiraydigan yulduzchalar */
for (let i = 0; i < 18; i++) {
  const star = document.createElement("div");

  star.className = "sparkle";
  star.innerHTML = "✦";

  star.style.left = Math.random() * 100 + "vw";
  star.style.top = Math.random() * 100 + "vh";
  star.style.animationDelay = Math.random() * 2 + "s";

  document.body.appendChild(star);
}
</script>

<div class="scene">

  <div class="gift">

    <div class="bunny">
      <div class="rabbit-heart">❤️</div>

      <div class="ear left"></div>
      <div class="ear right"></div>

      <div class="head">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="nose"></div>
      </div>
    </div>

    <div class="lid"></div>
    <div class="box"></div>

  </div>

  <h1 class="title">
    Mitti malikam uchun ❤️
  </h1>

</div>

</body>
</html>
